# PrusaSlicer profile for HDD Platter / CD-DVD Flow Conditioner
# Base: Generic PETG
# Optimized for precision on critical parts

[print:PETG_Precision_Flow_Device]
inherits = 0.20mm QUALITY @MK4

layer_height = 0.2
first_layer_height = 0.2
perimeters = 5
top_solid_layers = 6
bottom_solid_layers = 6
fill_density = 35%
fill_pattern = gyroid
top_fill_pattern = monotonic
bottom_fill_pattern = monotonic

brim_width = 8
brim_type = outer_only

elefant_foot_compensation = 0.15

support_material = 0
support_material_threshold = 45

infill_overlap = 25%

external_perimeter_speed = 40%
perimeter_speed = 50%
infill_speed = 80
solid_infill_speed = 60
top_solid_infill_speed = 40

bridge_speed = 30
bridge_flow_ratio = 0.95

notes = Use this profile for the Flow Conditioner project.\nFor spacers and bearing bores, create a 0.15mm or 0.12mm variant of this profile.

[filament:Generic PETG for Device]
inherits = Generic PETG

temperature = 245
first_layer_temperature = 250
bed_temperature = 85
first_layer_bed_temperature = 90

fan_always_on = 1
cooling = 1
min_fan_speed = 30
max_fan_speed = 80

filament_density = 1.27
filament_cost = 25

[printer:Bambu Lab X1C 0.4 for Device]
inherits = Bambu Lab X1 Carbon 0.4 nozzle

notes = Use the Bambu JSON profile instead for best results. This is a fallback.
